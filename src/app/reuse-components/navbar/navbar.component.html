<div class="nav"><mat-toolbar class="text-white background--color">
  <mat-toolbar-row class="d-flex justify-content-between">

    <div class="d-flex">
      @if (showExpandButtons) {
        <button mat-icon-button id="menu" (click)="openCloseMemu()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <div class="d-flex align-items-center">
        <img [routerLink]="['/dashboard']" src="assets/images/CoreERP_icon.png" alt="hi" height="25" />
        <span [routerLink]="['/dashboard']" class="px-2">AMT ERP</span>
      </div>
    </div>

    @if (commonService.routeParam) {
      <div>
        {{ ( commonService.routeParam + '.title') | translate }}
      </div>
    }

    <div class="d-flex">
      @if (showExpandButtons) {
        <div class="d-flex mx-4">
          <span class="align-items-center d-flex">
            <mat-icon>account_circle</mat-icon>
          </span>
          @if (loginUser != null) {
            <small class="mx-1 my-2"> {{loginUser.userName}} </small>
          }
        </div>
      }

      @if (showExpandButtons) {
        <button class="my-2" mat-button (click)="logout()">
          <b>Logout</b>
        </button>
      }
    </div>

  </mat-toolbar-row>
</mat-toolbar>
</div>
