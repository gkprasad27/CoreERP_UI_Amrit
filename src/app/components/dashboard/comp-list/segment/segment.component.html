<div class="position-relative popup-class">
  <mat-card-title class="boader--color d-flex justify-content-between position-absolute w-100">
    <span> {{'segment.title' | translate }} </span>
    <mat-icon class="my-2 cursor--pointer" (click)="cancel()">close</mat-icon>
  </mat-card-title>
  <mat-card-content class="pt-5 p-2 m-0 overflow-auto">
    <form [formGroup]="modelFormData" autocomplete="off">

      <div class="row">

        <mat-form-field class="col-3" [ngClass]="{ 'ng--valid': formControls.id.valid && formControls.id.status != 'DISABLED', 
           'ng--invalid': !formControls.id.valid && formControls.id.status != 'DISABLED'  }">
          <mat-label [translate]="'segment.id'"></mat-label>
          <input matInput  formControlName="id" appFocusOnEnter tabIndex="1">
          @if (!formControls.id.valid && formControls.id.status != 'DISABLED') {
            <mat-error
              [ngClass]="{ 'ng--invalid': !formControls.id.valid  }">Segment Code
            is required</mat-error>
          }
        </mat-form-field>

        <mat-form-field class="col-3"
          [ngClass]="{ 'ng--valid': formControls.name.valid, 'ng--invalid': !formControls.name.valid  }">
          <mat-label [translate]="'segment.name'"></mat-label>
          <input matInput  formControlName="name" appFocusOnEnter
            tabIndex="2" maxlength="50">
          @if (!formControls.name.valid) {
            <mat-error [ngClass]="{ 'ng--invalid': !formControls.name.valid  }">Segment
            Name is required</mat-error>
          }
        </mat-form-field>

        <mat-form-field class="col-3">
          <mat-label [translate]="'segment.active'"></mat-label>
          <mat-select formControlName="active" appFocusOnEnter tabIndex="3">
            @for (active of active; track active) {
              <mat-option [value]="active.value">
                {{active.viewValue}}
              </mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>
      <mat-divider></mat-divider>

    </form>
  </mat-card-content>

  <div class="form-element mt-2 d-flex justify-content-end">
    <button mat-raised-button class="button-color-red text-white mx-1" (click)="cancel()" appFocusOnEnter tabIndex="4">
      {{ 'COMMON.CANCEL' | translate }}
    </button>
    <button mat-raised-button type="submit" class="button-color-bule text-white mx-1" (click)="save()" appFocusOnEnter
      tabIndex="5">
      {{ 'COMMON.SAVE' | translate }}
    </button>
  </div>

</div>
